<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      overflow-x: hidden;
      transform: translateX(-100%);
      transition: transform 0.7s ease;
    }

    .show {
      transform: translateX(0);
    }

    .glow {
      box-shadow: 0 0 20px rgba(99,102,241,0.6);
    }

    .typing::after {
      content: "|";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* 🔥 ANIMATED BACKGROUND */
    @keyframes float1 {
      0% { transform: translate(0, 0); }
      50% { transform: translate(200px, 150px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes float2 {
      0% { transform: translate(300px, 100px); }
      50% { transform: translate(-100px, 200px); }
      100% { transform: translate(300px, 100px); }
    }

    @keyframes float3 {
      0% { transform: translate(-200px, -100px); }
      50% { transform: translate(100px, -200px); }
      100% { transform: translate(-200px, -100px); }
    }

    .animate-float1 {
      animation: float1 12s ease-in-out infinite;
    }

    .animate-float2 {
      animation: float2 15s ease-in-out infinite;
    }

    .animate-float3 {
      animation: float3 18s ease-in-out infinite;
    }
  </style>
</head>

<body class="text-white" id="mainBody">

  <!-- 🔥 Animated Background -->
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute w-72 h-72 bg-indigo-500 rounded-full blur-3xl opacity-20 animate-float1"></div>
    <div class="absolute w-72 h-72 bg-purple-500 rounded-full blur-3xl opacity-20 animate-float2"></div>
    <div class="absolute w-72 h-72 bg-pink-500 rounded-full blur-3xl opacity-20 animate-float3"></div>
  </div>

  <!-- Navbar -->
  <nav class="flex justify-center items-center p-6">
    <h1 class="text-xl font-bold text-indigo-400">MyPage</h1>
  </nav>

  <!-- Hero -->
  <section class="flex flex-col items-center justify-center text-center mt-20 px-6">
    <h2 class="text-4xl md:text-6xl font-bold mb-4">
      Welcome
    </h2>

    <p class="text-gray-400 max-w-xl mb-6">
      dibuat oleh MUHAMMAD ILHAM YUSUF
    </p>

    <!-- BIO -->
    <div class="bg-white/5 p-6 rounded-2xl backdrop-blur-lg max-w-2xl text-gray-300 mb-6">
      <p id="bio" class="typing whitespace-pre-line leading-relaxed"></p>
    </div>

    <button onclick="goBack()" class="px-6 py-3 bg-indigo-500 rounded-full hover:bg-indigo-600 transition glow">
      Back
    </button>
  </section>

  <!-- Footer -->
  <footer class="text-center mt-20 p-6 text-gray-500">
    © 2026 - Dibuat dengan ❤️
  </footer>

  <script>
    const bioText = `Perkenalkan, nama saya Muhammad Ilham Yusuf. Saya lahir di Tangerang pada tanggal 25 Juni 2007, dan dilahirkan di Rumah Sakit Kabupaten Tangerang.

Saat ini, saya berusia 18 tahun dan sedang menempuh pendidikan di SMK Budi Mulia Ciledug.

Harapan saya setelah lulus adalah dapat menjadi lulusan terbaik di perguruan tinggi atau memperoleh pekerjaan yang layak. Semoga apa yang saya harapkan pada saat UKK ini dapat terwujud. Aamiin.`;

    let typingSpeed = 30;
    let index = 0;

    function typeEffect() {
      const bio = document.getElementById("bio");

      function typing() {
        if (index < bioText.length) {
          bio.innerHTML += bioText.charAt(index);
          index++;
          setTimeout(typing, typingSpeed);
        }
      }

      typing();
    }

    window.onload = () => {
      document.getElementById("mainBody").classList.add("show");
      typeEffect();
    };

    function goBack() {
      window.location.href = "website.html";
    }
  </script>

</body>
</html>
